<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cavalari | Blog Tech</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">


    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">


    <link rel="stylesheet" href="/Cavalari0100/assets/css/style.css">
</head>

<body>


    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand logo-text" href="#">Cavalari Code's</a>
            <a href="/Cavalari0100/index.html" class="btn btn-tech mt-4">inicio</a>
        </div>
    </nav>


    <section class="hero">
        <div class="container text-center">
            <img src="/Cavalari0100/assets/img/index/dados.png" alt="capa_projeto" class="img-fluid rounded-circle"
                width="25%">
            <p class="lead mt-3">
                Dados extraidos do navegador do usuário, utilizando a API Navigator, Geolocation e Battery.
            </p>
            <a href="#sobre" class="btn btn-tech mt-4">sobre o projeto</a>
        </div>
    </section>
    <section class="container mt-5">

        <h2 class="text-center mb-4">Painel do Navegador</h2>

        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>Informação</th>
                    <th>Valor</th>
                </tr>
            </thead>

            <tbody id="browserInfo"></tbody>

        </table>

    </section>


    <footer>
        <div class="container text-center">
            <p>© 2026 João Vitor Cavalari Spavier</p>
            <p>Construído com 💻 e dedicação</p>
            <a href="#" class="btn btn-tech mt-4">Topo</a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function addRow(nome, valor) {

            const tabela = document.getElementById("browserInfo")

            const row = `
        <tr>
            <td>${nome}</td>
            <td>${valor}</td>
        </tr>
    `

            tabela.innerHTML += row
        }


        function carregarInfo() {

            addRow("User Agent", navigator.userAgent)

            addRow("Idioma", navigator.language)

            addRow("Plataforma", navigator.platform)

            addRow("Cookies habilitados", navigator.cookieEnabled)

            addRow("Online", navigator.onLine ? "Sim" : "Não")

            addRow("URL atual", window.location.href)

            addRow("Resolução da tela", screen.width + " x " + screen.height)

            addRow("Tamanho da janela", window.innerWidth + " x " + window.innerHeight)

            addRow("Profundidade de cor", screen.colorDepth)

            addRow("Fuso horário", Intl.DateTimeFormat().resolvedOptions().timeZone)

            if (navigator.deviceMemory) {
                addRow("Memória do dispositivo", navigator.deviceMemory + " GB")
            }

            if (navigator.hardwareConcurrency) {
                addRow("Núcleos da CPU", navigator.hardwareConcurrency)
            }

        }

        carregarInfo()


        /* BATERIA */

        if (navigator.getBattery) {

            navigator.getBattery().then(function (battery) {

                addRow("Nível da bateria", (battery.level * 100) + "%")

                addRow("Carregando", battery.charging ? "Sim" : "Não")

            })

        }


        /* GEOLOCALIZAÇÃO */

        if (navigator.geolocation) {

            navigator.geolocation.getCurrentPosition(function (pos) {

                addRow("Latitude", pos.coords.latitude)

                addRow("Longitude", pos.coords.longitude)

                addRow("Precisão", pos.coords.accuracy + " metros")

            },

                function () {
                    addRow("Geolocalização", "Permissão negada")
                })

        }
    </script>
</body>

</html>
